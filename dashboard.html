<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Home Dashboard</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f1a;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #e94560;
            margin-bottom: 30px;
            font-size: 24px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto;
        }

        .card {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid #1a1a3e;
        }

        .card.full {
            grid-column: span 2;
        }

        .label {
            font-size: 13px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .value {
            font-size: 42px;
            font-weight: bold;
            color: #e94560;
        }

        .value.light {
            color: #f5a623;
        }

        .unit {
            font-size: 16px;
            color: #aaa;
            margin-top: 4px;
        }

        /* LED Card */
        .led-indicator {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 10px auto;
            background: #333;
            transition: all 0.3s;
            box-shadow: none;
        }

        .led-indicator.on {
            background: #4CAF50;
            box-shadow: 0 0 20px #4CAF50, 0 0 40px #4CAF5066;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .btn {
            padding: 12px 28px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn.on {
            background: #4CAF50;
            color: white;
        }

        .btn.off {
            background: #e94560;
            color: white;
        }

        /* Status dot */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4CAF50;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }

        .last-update {
            text-align: center;
            color: #555;
            font-size: 12px;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <h1>🏠 Smart Home Dashboard</h1>

    <div class="grid">

        <!-- Temperature Card -->
        <div class="card">
            <div class="label">🌡️ Temperature</div>
            <div class="value" id="temp">--</div>
            <div class="unit">°C</div>
        </div>

        <!-- Light Card -->
        <div class="card">
            <div class="label">💡 Light Level</div>
            <div class="value light" id="light">--</div>
            <div class="unit">%</div>
        </div>

        <!-- LED Control Card -->
        <div class="card full">
            <div class="label">💡 LED Control</div>
            <div class="led-indicator" id="ledIndicator"></div>
            <div id="ledStatus" style="color:#888; margin-top:8px;">--</div>
            <div class="btn-group">
                <button class="btn on" onclick="setLED('ON')">Turn ON</button>
                <button class="btn off" onclick="setLED('OFF')">Turn OFF</button>
            </div>
        </div>

    </div>

    <div class="status">
        <div class="dot"></div>
        Live updates from Firebase
    </div>

    <div class="last-update" id="lastUpdate">Last update: --</div>

    <script>
        // ─── YOUR FIREBASE CONFIG ──────────────────────
        // Get this from Firebase Console → Project Settings → Your apps → SDK setup
        const firebaseConfig = {
            apiKey: "AIzaSyCkrQqHJ6cACQ1hEce90xXfPVXTN1tTShU",
  	    authDomain: "led-control-356b6.firebaseapp.com",
  	    databaseURL: "https://led-control-356b6-default-rtdb.firebaseio.com",
  	    projectId: "led-control-356b6",
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ─── Listen to temperature ─────────────────────
        database.ref("/sensors/temperature").on("value", (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                document.getElementById("temp").textContent = val.toFixed(1);
                updateTime();
            }
        });

        // ─── Listen to light level ─────────────────────
        database.ref("/sensors/light").on("value", (snapshot) => {
            const val = snapshot.val();
            if (val !== null) {
                document.getElementById("light").textContent = val;
                updateTime();
            }
        });

        // ─── Listen to LED status ──────────────────────
        database.ref("/led/status").on("value", (snapshot) => {
            const val = snapshot.val();
            const indicator = document.getElementById("ledIndicator");
            const statusText = document.getElementById("ledStatus");

            if (val === "ON") {
                indicator.classList.add("on");
                statusText.textContent = "LED is ON";
                statusText.style.color = "#4CAF50";
            } else {
                indicator.classList.remove("on");
                statusText.textContent = "LED is OFF";
                statusText.style.color = "#e94560";
            }
        });

        // ─── Send LED command to Firebase ─────────────
        function setLED(command) {
            database.ref("/led/command").set(command);
        }

        // ─── Update last update time ───────────────────
        function updateTime() {
            const now = new Date();
            document.getElementById("lastUpdate").textContent =
                "Last update: " + now.toLocaleTimeString();
        }
    </script>
</body>

</html>
